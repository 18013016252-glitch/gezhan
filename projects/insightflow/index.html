<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI InsightFlow | Mindy Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #030303;
      --panel: #070707;
      --line: rgba(255, 255, 255, .22);
      --line-strong: rgba(255, 255, 255, .72);
      --text: #f4f4f4;
      --muted: rgba(244, 244, 244, .62);
      --dim: rgba(244, 244, 244, .38);
      --accent: #ffffff;
      --blue: #9fc7ff;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 50% 96%, rgba(255, 255, 255, .14), transparent 24%),
        radial-gradient(circle at 50% 48%, rgba(255, 255, 255, .06), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: "Geist", "Inter", "Noto Sans SC", system-ui, sans-serif;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 8px 8px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 84%, transparent);
      opacity: .58;
    }

    body::after {
      background:
        repeating-linear-gradient(to bottom, rgba(255,255,255,.045), rgba(255,255,255,.045) 1px, transparent 1px, transparent 5px);
      mix-blend-mode: screen;
      opacity: .22;
    }

    a { color: inherit; text-decoration: none; }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .page {
      width: min(1120px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 24px 0 80px;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 64px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, .78);
      padding: 0 22px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .nav-links a {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      padding: 0 14px;
      background: rgba(0, 0, 0, .32);
      color: rgba(244, 244, 244, .82);
    }

    .nav-links a + a {
      margin-left: -1px;
    }

    .nav-links a:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, .1);
      color: var(--text);
    }

    .hero {
      padding: clamp(34px, 5vw, 64px) 0 0;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      max-width: none;
      font-size: clamp(34px, 7.2vw, 86px);
      line-height: .94;
      letter-spacing: -.05em;
      white-space: nowrap;
    }

    .intro {
      margin: clamp(12px, 2vw, 20px) 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: clamp(16px, 1.7vw, 21px);
      line-height: 1.65;
      font-weight: 600;
    }

    .hero-visual {
      margin-top: clamp(18px, 3vw, 30px);
      border: 1px solid var(--line-strong);
      padding: clamp(6px, 1vw, 10px);
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), transparent 42%),
        rgba(0,0,0,.9);
      position: relative;
      overflow: hidden;
    }

    .hero-visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0 44%, rgba(255,255,255,.12) 48%, transparent 52% 100%);
      transform: translateX(-120%);
      animation: scan 4.8s linear infinite;
    }

    @keyframes scan {
      to { transform: translateX(120%); }
    }

    .hero-visual img {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      aspect-ratio: 21 / 9;
      object-fit: cover;
      background: #fff;
    }

    @media (max-width: 860px) {
      .page { width: min(100% - 28px, 720px); padding-top: 14px; }
      .top-nav { align-items: center; flex-direction: row; gap: 8px; padding: 12px; }
      .brand { font-size: 10px; letter-spacing: .04em; }
      .nav-links { justify-content: flex-end; flex-wrap: nowrap; font-size: 10px; letter-spacing: .04em; }
      .nav-links a { min-height: 32px; padding: 0 9px; }
      .hero { padding: 30px 0 0; }
      h1 {
        font-size: clamp(29px, 10.5vw, 42px);
        letter-spacing: -.06em;
      }
      .intro {
        margin-top: 12px;
        font-size: 14px;
        line-height: 1.58;
      }
      .hero-visual {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top-nav">
      <a class="brand" href="../index.html">ALL PROJECT</a>
      <nav class="nav-links mono" aria-label="Project navigation">
        <a href="../../experience/index.html">技能经验</a>
        <a href="../../index.html">返回主页</a>
      </nav>
    </header>

    <section class="hero" aria-labelledby="page-title">
      <div>
        <p class="eyebrow mono">AI WORKFLOW / LOCAL TOOL</p>
        <h1 id="page-title">AI InsightFlow</h1>
        <p class="intro">
          一个面向发布会和长视频内容的 AI 工作流工具：上传视频后自动提取关键画面、转写音频内容，经过人工确认后生成结构化洞察报告，并导出 Word 文件。
        </p>
      </div>
      <figure class="hero-visual" aria-label="InsightFlow 工作流说明图">
        <img src="../../public/projects/insightflow/insightflow-workflow.png" alt="InsightFlow AI 发布会洞察报告生成工具流程说明图" />
      </figure>
    </section>
  </main>
</body>
</html>
