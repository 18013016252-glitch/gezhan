<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <meta name="description" content="Mindy skill inventory and work experience archive" />
  <title>Experience Archive | Mindy Portfolio</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --page-bg: #030303;
      --panel-bg: #080808;
      --ink: #eeeeee;
      --dim: rgba(238, 238, 238, 0.64);
      --faint: rgba(238, 238, 238, 0.28);
      --line: rgba(238, 238, 238, 0.16);
      --grain: rgba(255, 255, 255, 0.045);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.08), transparent 20%),
        linear-gradient(180deg, #000 0%, #030303 48%, #000 100%);
      color: var(--ink);
      font-family: "Geist", "Inter", sans-serif;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -2;
      content: "";
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.16) 1px, transparent 1.5px),
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 12px 12px, 100% 5px;
      opacity: 0.34;
      pointer-events: none;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 4px),
        radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.72) 100%);
      mix-blend-mode: screen;
      opacity: 0.22;
      pointer-events: none;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .top-nav {
      position: fixed;
      top: 24px;
      left: 50%;
      z-index: 50;
      width: min(92vw, 1180px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.72);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      transform: translateX(-50%);
    }

    .nav-link {
      color: var(--ink);
      text-decoration: none;
      transition: opacity 0.24s ease;
    }

    .nav-link:hover { opacity: 0.64; }

    .page-shell {
      width: min(1180px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 104px 0 80px;
    }

    .section-kicker {
      color: var(--dim);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .section-heading-large {
      color: #fff;
      font-size: 40px;
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: -0.05em;
      text-transform: none;
      text-shadow: 2px 0 rgba(255, 255, 255, 0.18), -2px 0 rgba(255, 255, 255, 0.08);
    }

    .pixel-title {
      margin: 12px 0 0;
      font-size: clamp(36px, 6vw, 78px);
      font-weight: 800;
      line-height: 0.94;
      letter-spacing: -0.05em;
      text-shadow: 2px 0 rgba(255, 255, 255, 0.18), -2px 0 rgba(255, 255, 255, 0.08);
    }

    .skill-stage {
      position: relative;
      min-height: 360px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: clamp(30px, 3.5vw, 46px) clamp(28px, 4vw, 56px) clamp(24px, 3.5vw, 42px);
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background: #020202;
    }

    .skill-stage::before {
      position: absolute;
      inset: 0;
      content: "";
      z-index: 1;
      background: linear-gradient(180deg, rgba(2, 2, 2, 0.1), transparent 42%, rgba(2, 2, 2, 0.34));
      pointer-events: none;
    }

    .skill-heading {
      position: relative;
      z-index: 2;
      margin-bottom: clamp(26px, 4vw, 42px);
    }

    .skill-heading .section-kicker {
      font-size: 18px;
      letter-spacing: 0.2em;
    }

    .skill-dot-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      opacity: 0.9;
      pointer-events: none;
    }

    .skill-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 26px;
      align-items: start;
    }

    .skill-card {
      display: grid;
      grid-template-rows: 50px 30px auto;
      align-content: start;
      min-height: 150px;
      padding: 0 0 8px;
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 0.24s ease, opacity 0.24s ease;
    }

    .skill-card:hover,
    .skill-card.is-active {
      opacity: 1;
    }

    .skill-number {
      display: flex;
      align-items: end;
      height: 50px;
      margin: 0;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: clamp(22px, 2.1vw, 34px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .skill-card h3 {
      margin: 0;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
    }

    .skill-card p {
      margin: 0;
      color: rgba(255, 255, 255, 0.56);
      font-size: 13px;
      line-height: 1.65;
    }

    .career-stage {
      min-height: 760px;
      display: grid;
      grid-template-columns: minmax(260px, 3fr) minmax(0, 8fr);
      gap: clamp(28px, 4.5vw, 72px);
      align-items: center;
      padding: clamp(46px, 7vw, 88px) clamp(24px, 5vw, 64px);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.03), transparent 34%),
        #020202;
    }

    .film-reel {
      position: relative;
      max-height: 660px;
    }

    .film-reel::before,
    .film-reel::after {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 22px;
      content: "";
      z-index: 3;
      pointer-events: none;
      background:
        repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.42) 0 12px, transparent 12px 36px),
        rgba(255, 255, 255, 0.08);
    }

    .film-reel::before { left: 0; }
    .film-reel::after { right: 0; }

    .film-strip {
      position: relative;
      max-height: 660px;
      overflow-y: auto;
      padding: 0 42px;
      scrollbar-width: none;
    }

    .film-strip::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .film-frame {
      position: relative;
      width: 100%;
      min-height: 210px;
      margin: 0 0 24px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: #050505;
      color: #050505;
      cursor: pointer;
      filter: grayscale(1) contrast(1.4);
      image-rendering: pixelated;
      opacity: 0.52;
      overflow: hidden;
      transition: opacity 0.24s ease, transform 0.24s ease, filter 0.24s ease;
    }

    .film-frame:hover,
    .film-frame.is-active {
      opacity: 1;
      filter: grayscale(1) contrast(1.7);
      transform: translateX(8px);
    }

    .film-frame::before {
      position: absolute;
      inset: 0;
      content: "";
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.2) 0 1px, transparent 1px 5px),
        radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(0, 0, 0, 0.34) 78%, rgba(0, 0, 0, 0.72) 100%);
      mix-blend-mode: multiply;
      opacity: 0.72;
      pointer-events: none;
      z-index: 2;
    }

    .film-frame img {
      display: block;
      width: 100%;
      height: 210px;
      object-fit: cover;
      object-position: center;
    }

    .film-placeholder {
      display: grid;
      place-items: center;
      height: 210px;
      color: rgba(255, 255, 255, 0.58);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 38%),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 7px),
        #050505;
    }

    .film-placeholder-mark {
      position: relative;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68%;
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.18em;
    }

    .career-copy {
      position: relative;
      min-height: 560px;
      display: grid;
      align-content: center;
      justify-self: center;
      width: min(100%, 760px);
      padding: clamp(28px, 5vw, 60px);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.025), transparent),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 22px);
    }

    .career-copy h2 {
      margin: 0 0 10px;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: clamp(24px, 2.1vw, 30px);
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .career-copy .role {
      margin: 0 0 8px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 20px;
      font-weight: 800;
    }

    .career-copy .date {
      margin: 0 0 30px;
      color: rgba(255, 255, 255, 0.54);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
    }

    .career-detail-block {
      display: grid;
      gap: 20px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 15px;
      line-height: 1.78;
    }

    .career-detail-block strong {
      display: block;
      margin-bottom: 6px;
      color: #fff;
      font-size: 15px;
    }

    .career-detail-block ul {
      margin: 0;
      padding-left: 18px;
    }

    .career-detail-block li + li { margin-top: 8px; }

    @media (max-width: 920px) {
      .skill-stage { min-height: auto; padding-top: 96px; }
      .skill-grid { grid-template-columns: 1fr; gap: 14px; }
      .skill-card { grid-template-rows: auto; min-height: 0; }
      .skill-number { height: auto; margin: 18px 0 12px; }
      .career-stage { grid-template-columns: 1fr; }
      .career-stage > *,
      .film-reel,
      .film-strip,
      .career-copy {
        width: 100%;
        min-width: 0;
      }
      .film-reel { max-height: none; }
      .film-reel::before,
      .film-reel::after { display: none; }
      .film-strip {
        max-height: none;
        display: grid;
        grid-template-columns: repeat(3, 180px);
        gap: 16px;
        max-width: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 34px 0;
      }
      .film-frame { min-height: 190px; margin: 0; }
      .film-frame img { height: 190px; }
      .section-heading-large { font-size: clamp(32px, 9vw, 40px); }
      .career-copy {
        justify-self: stretch;
        border-top: 1px solid rgba(255, 255, 255, 0.16);
      }
    }
  </style>
</head>

  <script>
    const setupSkillDots = () => {
      const stage = document.querySelector("#skills");
      const canvas = document.querySelector("[data-skill-dots]");
      if (!stage || !canvas) return;

      const ctx = canvas.getContext("2d");
      if (!ctx) return;

      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const pointer = { x: 0, y: 0, targetX: 0, targetY: 0, inside: false };
      let width = 0;
      let height = 0;
      let dpr = 1;
      let frame = 0;

      const resize = () => {
        const rect = stage.getBoundingClientRect();
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = Math.max(1, Math.round(rect.width));
        height = Math.max(1, Math.round(rect.height));
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };

      const draw = () => {
        pointer.x += (pointer.targetX - pointer.x) * 0.055;
        pointer.y += (pointer.targetY - pointer.y) * 0.055;
        frame += reducedMotion ? 0.002 : 0.01;

        ctx.clearRect(0, 0, width, height);

        ctx.fillStyle = "rgba(2, 2, 2, 1)";
        ctx.fillRect(0, 0, width, height);

        const cols = width < 720 ? 34 : 58;
        const rows = width < 720 ? 22 : 32;
        const horizon = height * 0.24;
        const perspective = height * 0.86;
        const amplitude = height * 0.08;

        for (let row = 0; row < rows; row += 1) {
          const z = row / (rows - 1);
          const scale = 0.32 + z * 1.14;
          const rowPoints = [];

          for (let col = 0; col < cols; col += 1) {
            const u = (col / (cols - 1) - 0.5) * 2;
            const wave = Math.sin(col * 0.38 + frame * 1.4) * 0.24 + Math.cos(row * 0.46 + frame * 1.8) * 0.28;
            const ripple = Math.sin((u - pointer.x * 0.18) * 5 + (z - pointer.y * 0.18) * 8 - frame * 3.6) * (pointer.inside ? 0.38 : 0.12);
            const x = width * 0.5 + u * width * 0.5 * scale + pointer.x * 22 * z;
            const y = horizon + z * perspective + (wave + ripple) * amplitude * z - pointer.y * 22 * z;
            rowPoints.push({ x, y, z });
          }

          if (row % 3 === 0) {
            ctx.beginPath();
            rowPoints.forEach((point, index) => {
              if (index === 0) ctx.moveTo(point.x, point.y);
              else ctx.lineTo(point.x, point.y);
            });
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.018 + z * 0.06})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }

          rowPoints.forEach((point) => {
            if (point.y < 0 || point.y > height + 24) return;
            const alpha = 0.08 + point.z * 0.34;
            const radius = 0.6 + point.z * 1.35;
            ctx.beginPath();
            ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.fill();
          });
        }

        requestAnimationFrame(draw);
      };

      stage.addEventListener("pointermove", (event) => {
        const rect = stage.getBoundingClientRect();
        const localX = (event.clientX - rect.left) / rect.width;
        const localY = (event.clientY - rect.top) / rect.height;
        pointer.targetX = (localX - 0.5) * 2;
        pointer.targetY = (localY - 0.5) * 2;
        pointer.inside = true;
        stage.style.setProperty("--skill-mouse-x", `${localX * 100}%`);
        stage.style.setProperty("--skill-mouse-y", `${localY * 100}%`);
      });

      stage.addEventListener("pointerleave", () => {
        pointer.targetX = 0;
        pointer.targetY = 0;
        pointer.inside = false;
        stage.style.setProperty("--skill-mouse-x", "50%");
        stage.style.setProperty("--skill-mouse-y", "55%");
      });

      resize();
      window.addEventListener("resize", resize);
      draw();
    };

    setupSkillDots();

    const skillCards = [...document.querySelectorAll("[data-skill]")];

    const setActiveSkill = (card) => {
      skillCards.forEach((item) => item.classList.toggle("is-active", item === card));
    };

    skillCards.forEach((card) => {
      card.addEventListener("click", () => setActiveSkill(card));
      card.addEventListener("focus", () => setActiveSkill(card));
    });

      hoymiles: {
        company: "杭州禾迈电力电子股份有限公司",
        role: "整合营销",
        date: "",
        html: `

    const frames = [...document.querySelectorAll("[data-career]")];
    const careerDetail = document.querySelector("[data-career-detail]");
    const filmStrip = document.querySelector("[data-film-strip]");
    let filmAutoScroll = true;
    let filmLoopHeight = 0;

    const setActiveCareer = (id) => {
      const item = careerData[id];
      if (!item) return;
      frames.forEach((frame) => frame.classList.toggle("is-active", frame.dataset.career === id));
      careerDetail.innerHTML = `
        <h2>${item.company}</h2>
        <p class="role">${item.role}</p>
        ${item.date ? `<p class="date">${item.date}</p>` : ""}
        <div class="career-detail-block">${item.html}</div>
      `;
    };

    frames.forEach((frame) => {
      frame.addEventListener("click", () => setActiveCareer(frame.dataset.career));
      frame.addEventListener("focus", () => setActiveCareer(frame.dataset.career));
    });

    setActiveCareer("goodwe");

    const setupFilmLoop = () => {
      if (!filmStrip) return;
      const originals = [...filmStrip.querySelectorAll("[data-career]")];
      originals.forEach((frame) => {
        const clone = frame.cloneNode(true);
        clone.setAttribute("aria-hidden", "true");
        clone.tabIndex = -1;
        clone.classList.remove("is-active");
        filmStrip.appendChild(clone);
      });

      const refreshLoopHeight = () => {
        filmLoopHeight = filmStrip.scrollHeight / 2;
      };

      refreshLoopHeight();
      window.addEventListener("resize", refreshLoopHeight);

      filmStrip.addEventListener("mouseenter", () => {
        filmAutoScroll = false;
      });

      filmStrip.addEventListener("mouseleave", () => {
        filmAutoScroll = true;
      });

      filmStrip.addEventListener("scroll", () => {
        if (!filmLoopHeight) return;
        if (filmStrip.scrollTop >= filmLoopHeight) {
          filmStrip.scrollTop -= filmLoopHeight;
        }
      });

      const tick = () => {
        const isHoveringFilm = filmStrip.matches(":hover");
        if (filmAutoScroll && !isHoveringFilm && filmLoopHeight && window.innerWidth > 920) {
          filmStrip.scrollTop += 1;
          if (filmStrip.scrollTop >= filmLoopHeight) {
            filmStrip.scrollTop -= filmLoopHeight;
          }
        }
        requestAnimationFrame(tick);
      };

      requestAnimationFrame(tick);
    };

    setupFilmLoop();
  </script>
